services:
  traefik:
    image: traefik:v3.1
    command:
      - --api.dashboard=true
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --entrypoints.web.address=:80
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    networks:
      - inventory

  pencatatan:
    build: .
    env_file: .env
    environment:
      SERVICE_ROLE: pencatatan
      APP_URL: http://localhost
    volumes:
      - ./:/var/www/html
      - /var/www/html/vendor
    labels:
      - traefik.enable=true
      - traefik.http.routers.pencatatan.rule=Host(`pencatatan.localhost`) || Host(`localhost`)
      - traefik.http.routers.pencatatan.entrypoints=web
      - traefik.http.services.pencatatan.loadbalancer.server.port=8000
    networks:
      - inventory

  laporan:
    build: .
    env_file: .env
    environment:
      SERVICE_ROLE: laporan
      APP_URL: http://laporan.localhost
    volumes:
      - ./:/var/www/html
      - /var/www/html/vendor
    labels:
      - traefik.enable=true
      - traefik.http.routers.laporan.rule=Host(`laporan.localhost`)
      - traefik.http.routers.laporan.entrypoints=web
      - traefik.http.services.laporan.loadbalancer.server.port=8000
    networks:
      - inventory

  notif:
    build: .
    env_file: .env
    environment:
      SERVICE_ROLE: notif
      APP_URL: http://notif.localhost
    volumes:
      - ./:/var/www/html
      - /var/www/html/vendor
    labels:
      - traefik.enable=true
      - traefik.http.routers.notif.rule=Host(`notif.localhost`)
      - traefik.http.routers.notif.entrypoints=web
      - traefik.http.services.notif.loadbalancer.server.port=8000
    networks:
      - inventory

networks:
  inventory:
    driver: bridge
